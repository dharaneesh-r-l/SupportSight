<nav class="top-navbar">
    <div class="navbar-left">
        <button class="btn-icon d-none d-lg-flex" id="desktopSidebarToggle" title="Toggle Sidebar">
            <i class='bx bx-sidebar'></i>
        </button>
        <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" title="Toggle Navigation">
            <i class='bx bx-menu'></i>
        </button>
        <div class="page-title ms-2">
            <h1>{% block page_title %}Dashboard{% endblock %}</h1>
        </div>
    </div>
    
    <div class="navbar-right">
        <div class="navbar-actions">
            <button class="btn-icon" id="refreshData" title="Refresh Data">
                <i class='bx bx-refresh'></i>
            </button>
            <a href="{{ url_for('dashboard.quick_scan') }}" class="btn btn-primary btn-sm">
                <i class='bx bx-scan'></i>
                <span>New Scan</span>
            </a>
        </div>
        
        {% if current_user.is_authenticated %}
        <div class="navbar-user dropdown">
            <button class="user-toggle dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="user-avatar">
                    {{ current_user.initials }}
                </div>
                <div class="user-info">
                    <span class="user-name">{{ current_user.full_name }}</span>
                    <span class="user-role">{{ current_user.role|title }}</span>
                </div>
                <i class='bx bx-chevron-down ms-1'></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-3 p-2">
                <li class="px-3 py-2 border-bottom mb-1">
                    <div class="fw-bold text-dark fs-7">{{ current_user.full_name }}</div>
                    <div class="small text-muted font-monospace">{{ current_user.email }}</div>
                </li>
                <li>
                    <a class="dropdown-item py-2 rounded-2" href="{{ url_for('auth.profile') }}">
                        <i class='bx bx-user me-2 text-primary'></i>
                        <span>User Profile & Settings</span>
                    </a>
                </li>
                <li>
                    <a class="dropdown-item py-2 rounded-2" href="{{ url_for('dashboard.scan_history') }}">
                        <i class='bx bx-history me-2 text-primary'></i>
                        <span>Scan Audit History</span>
                    </a>
                </li>
                <li>
                    <a class="dropdown-item py-2 rounded-2" href="{{ url_for('auth.change_password') }}">
                        <i class='bx bx-key me-2 text-primary'></i>
                        <span>Change Password</span>
                    </a>
                </li>
                <li><hr class="dropdown-divider my-1"></li>
                <li>
                    <a class="dropdown-item py-2 rounded-2 text-danger" href="{{ url_for('auth.logout') }}">
                        <i class='bx bx-log-out me-2'></i>
                        <span>Sign Out</span>
                    </a>
                </li>
            </ul>
        </div>
        {% else %}
        <a href="{{ url_for('auth.login') }}" class="btn btn-sm btn-outline-primary ms-2">
            <i class='bx bx-log-in me-1'></i> Login
        </a>
        {% endif %}

    </div>
</nav>
