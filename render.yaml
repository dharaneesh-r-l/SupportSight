services:
  - type: web
    name: supportsight
    runtime: python
    buildCommand: "pip install -r requirements.txt && python init_db.py"
    startCommand: "gunicorn wsgi:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"

    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
